let EVENT='p2p';
let assign={};
let selectedId=null;

function esc(s){return String(s??'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}
function people(){ return DATA[EVENT]; }
function tableOf(p){ const a=assign[EVENT]; if(a && a[p.id]!==undefined) return a[p.id]; return p.table; }
function color(p){ return `var(--c-${p.category||'Other'})`; }

async function loadSeating(ev){
  if(!sb){ assign[ev]=null; return; }
  try{ const {data}=await sb.from('seating_state').select('state').eq('event',ev).maybeSingle();
    assign[ev]= (data&&data.state&&data.state.assign) ? data.state.assign : null;
    if(selectedId!=null && ev===EVENT) renderCard();
  }catch(e){ assign[ev]=null; }
}

const q=document.getElementById('q'), results=document.getElementById('results'), card=document.getElementById('card');

function renderResults(){
  const term=q.value.trim().toLowerCase();
  if(!term){ results.style.display='none'; return; }
  const list=people().filter(p=>((p.first+' '+p.last+' '+p.company).toLowerCase().includes(term)))
    .sort((a,b)=>(a.last||'').localeCompare(b.last||'')).slice(0,8);
  if(!list.length){ results.innerHTML='<div class="empty">No one by that name on the list.</div>'; results.style.display='block'; return; }
  results.innerHTML=list.map(p=>`<div class="r" data-id="${p.id}"><span class="dot" style="background:${color(p)}"></span><div><b>${esc(p.first)} ${esc(p.last)}</b> <span>${esc(p.company)||''}</span></div></div>`).join('');
  results.style.display='block';
  results.querySelectorAll('.r').forEach(el=>el.onclick=()=>{ select(+el.dataset.id); });
}

function select(id){
  selectedId=id;
  const p=people().find(x=>x.id===id);
  results.style.display='none';
  if(p){ q.value=(p.first+' '+p.last).trim(); }
  renderCard();
}

function renderCard(){
  const p=people().find(x=>x.id===selectedId);
  if(!p){ card.classList.remove('show'); return; }
  const t=tableOf(p);
  let seatHtml;
  if(t==null){
    seatHtml=`<div class="seat none"><div class="lbl">Your table</div><div class="big">Not assigned yet</div></div>`;
  } else {
    const mates=people().filter(x=>x.id!==p.id && tableOf(x)===t)
      .sort((a,b)=>(a.last||'').localeCompare(b.last||''));
    seatHtml=`<div class="seat"><div class="lbl">Your table</div><div class="big">${esc(String(t))}</div></div>
      <div class="mates"><h3>Who else is at table ${esc(String(t))} (${mates.length+1} guests)</h3>
      ${mates.length? mates.map(m=>`<div class="mate"><span class="dot" style="background:${color(m)}"></span><div><div class="nm">${esc(m.first)} ${esc(m.last)}</div><div class="co">${esc(m.company)||''}${m.title?' · '+esc(m.title):''}</div></div></div>`).join('')
        : '<div class="empty">Nobody else seated here yet.</div>'}</div>`;
  }
  card.innerHTML=`<div class="who">${esc(p.first)} ${esc(p.last)}<small>${esc(p.company)||''}${p.title?' · '+esc(p.title):''}</small></div>${seatHtml}`;
  card.classList.add('show');
}

q.addEventListener('input',renderResults);
q.addEventListener('focus',renderResults);
document.addEventListener('click',e=>{ if(!e.target.closest('.searchbox')) results.style.display='none'; });

if(sb){
  sb.channel('guest_view').on('postgres_changes',{event:'*',schema:'public',table:'seating_state'},payload=>{
    const row=payload.new; if(!row) return;
    if(row.state&&row.state.assign) assign[row.event]=row.state.assign;
    if(row.event===EVENT && selectedId!=null) renderCard();
  }).subscribe();
}

loadSeating('p2p');
</script>
</body>
</html>
