<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Beefbar Dinner · Seating Planner</title>
<style>
  :root{
    --bg:#0f1115; --panel:#171a21; --panel2:#1d212b; --line:#2a2f3a;
    --ink:#e8eaf0; --muted:#9aa3b2; --muted2:#6b7280;
    --accent:#6ea8fe; --accent2:#3b82f6; --good:#34d399; --warn:#fbbf24; --bad:#f87171;
    --chip:#222733; --radius:14px;
    /* category colors */
    --c-Technology:#5b9bff; --c-HR:#f4a259; --c-Sponsors:#c084fc; --c-Media:#22d3ee;
    --c-Founder:#34d399; --c-CEO:#f472b6; --c-COO:#a3e635; --c-CFO:#fbbf24;
    --c-President:#fb7185; --c-Facilitator:#94a3b8; --c-Host:#fde047; --c-Other:#94a3b8;
    --c-CPO:#fb923c;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:var(--bg); color:var(--ink);
    font:14px/1.4 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    display:flex; flex-direction:column; height:100vh; overflow:hidden;
  }
  header{
    display:flex; align-items:center; gap:14px; padding:12px 18px;
    background:linear-gradient(180deg,#191d26,#141821); border-bottom:1px solid var(--line);
    flex-wrap:wrap;
  }
  header h1{font-size:16px;margin:0;font-weight:650;letter-spacing:.2px;white-space:nowrap}
  header h1 .sub{color:var(--muted);font-weight:400;font-size:12px;margin-left:8px}
  .spacer{flex:1}
  .stat{display:flex;flex-direction:column;line-height:1.1;padding:0 10px;border-left:1px solid var(--line)}
  .stat b{font-size:15px}
  .stat span{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px}
  button,select,input{font:inherit;color:inherit}
  .btn{
    background:var(--panel2); border:1px solid var(--line); color:var(--ink);
    padding:7px 12px; border-radius:9px; cursor:pointer; white-space:nowrap;
  }
  .btn:hover{border-color:var(--accent);background:#232838}
  .btn.primary{background:var(--accent2);border-color:var(--accent2);color:#fff}
  .btn.primary:hover{background:#2f6fd6}
  .btn.ghost{background:transparent}

  main{display:flex;flex:1;min-height:0}
  /* ---- table map ---- */
  #board{flex:1;overflow:auto;padding:18px;display:grid;
    grid-template-columns:repeat(auto-fill,minmax(264px,1fr));
    gap:14px;align-content:start}
  .tnode{
    background:var(--panel); border:1px solid var(--line); border-radius:var(--radius);
    display:flex;flex-direction:column;transition:border-color .12s,background .12s;
  }
  .tnode.drag-over{border-color:var(--accent);background:#1b2230;box-shadow:0 0 0 2px rgba(110,168,254,.25) inset}
  .tnode.over-cap{border-color:#6b3030}
  .tnode.over-cap .cap{color:var(--bad)}
  .tn-head{display:flex;align-items:center;gap:8px;padding:10px 12px;border-bottom:1px solid var(--line)}
  .tn-head .num{font-weight:700;font-size:14px}
  .seatctl{margin-left:auto;display:flex;align-items:center;gap:6px}
  .seatctl .cap{font-variant-numeric:tabular-nums;color:var(--muted);font-size:12px;min-width:30px;text-align:center}
  .seatctl button{width:24px;height:24px;border-radius:7px;border:1px solid var(--line);
    background:var(--panel2);cursor:pointer;color:var(--muted);line-height:1;font-size:15px}
  .seatctl button:hover{color:var(--ink);border-color:var(--accent)}
  .tdel{margin-left:8px;width:24px;height:24px;border-radius:7px;border:1px solid var(--line);
    background:var(--panel2);cursor:pointer;color:var(--muted);font-size:12px;line-height:1}
  .tdel:hover{background:var(--bad);border-color:var(--bad);color:#0c0f14}
  .seats{display:flex;flex-direction:column;gap:7px;padding:10px}
  .seat-empty{border:1.5px dashed var(--line);border-radius:10px;padding:9px;text-align:center;
    color:var(--muted2);font-size:11px;letter-spacing:.3px}
  .tnode.drag-over .seat-empty{border-color:var(--accent);color:var(--accent)}

  /* ---- person card ---- */
  .person{
    display:flex;align-items:flex-start;gap:9px;background:var(--chip);
    border:1px solid var(--line);border-left-width:3px;border-radius:10px;
    padding:7px 9px;cursor:grab;user-select:none;position:relative;
  }
  .person:active{cursor:grabbing}
  .person.dragging{opacity:.4}
  .person .nm{font-weight:600;font-size:13px}
  .person .co{color:var(--muted);font-size:11.5px}
  .person .ti{color:var(--muted2);font-size:10.5px;margin-top:1px;
    display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden}
  .person .body{min-width:0;flex:1}
  .badges{display:flex;gap:4px;flex-shrink:0;align-items:center}
  .badge{font-size:9.5px;padding:1px 5px;border-radius:20px;border:1px solid var(--line);color:var(--muted);white-space:nowrap}
  .badge.vip{color:#0f1115;background:var(--warn);border-color:var(--warn);font-weight:700}
  .badge.din-Yes{color:var(--good);border-color:#1f4d3c;background:#102a20}
  .badge.din-No,.badge.din-Noresponse{color:var(--bad);border-color:#4d2222;background:#2a1010}
  .badge.din-Unsure,.badge.din-Cocktails{color:var(--warn);border-color:#4d3f1f;background:#2a2410}
  .catdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px}
  .person .focus{position:absolute;right:6px;bottom:5px;font-size:9px;color:var(--muted2)}
  .person.dim{opacity:.3}
  .person.hit{border-color:var(--accent);box-shadow:0 0 0 2px rgba(110,168,254,.4)}
  .person.dupco{box-shadow:0 0 0 1.5px var(--warn)}
  .person .dupflag{position:absolute;right:6px;bottom:5px;font-size:9px;color:var(--warn);font-weight:700}
  .tn-warn{margin-left:8px;font-size:10.5px;color:var(--warn);background:#2a2410;border:1px solid #4d3f1f;
    border-radius:20px;padding:2px 8px;cursor:default}
  .search-info{font-size:11.5px;color:var(--accent);margin-top:8px;min-height:0}
  .person .del{position:absolute;top:50%;right:6px;transform:translateY(-50%);width:20px;height:20px;
    border-radius:50%;border:1px solid var(--line);background:var(--panel);color:var(--muted);
    font-size:14px;line-height:1;cursor:pointer;opacity:0;transition:opacity .1s;z-index:2}
  .person:hover .del{opacity:1}
  .person .del:hover{background:var(--bad);border-color:var(--bad);color:#0c0f14}
  /* check-in switch */
  .chk{width:34px;height:18px;border-radius:20px;background:var(--panel2);border:1px solid var(--line);
    position:relative;cursor:pointer;padding:0;flex-shrink:0;transition:.15s}
  .chk .knob{position:absolute;top:1px;left:1px;width:14px;height:14px;border-radius:50%;background:var(--muted);transition:.15s}
  .chk.on{background:var(--good);border-color:var(--good)}
  .chk.on .knob{left:18px;background:#0c0f14}
  .person.checkedin{background:#10241b;border-color:#1f4d3c}
  .person.checkedin .nm::after{content:" ✓";color:var(--good);font-weight:700}
  /* add-person form */
  .addbtn{background:var(--panel2);border:1px solid var(--line);color:var(--ink);border-radius:8px;
    padding:5px 10px;font-size:12px;cursor:pointer;font-weight:600}
  .addbtn:hover{border-color:var(--accent)}
  .addform{display:none;flex-direction:column;gap:6px;margin-top:9px;padding:10px;
    background:var(--bg);border:1px solid var(--line);border-radius:10px}
  .addform.open{display:flex}
  .addform .two{display:flex;gap:6px}
  .addform input,.addform select{flex:1;min-width:0;background:var(--panel);border:1px solid var(--line);
    border-radius:7px;padding:6px 8px;font-size:12px;color:var(--ink)}
  .addform input:focus,.addform select:focus{outline:none;border-color:var(--accent)}
  .addform .acts{display:flex;gap:6px;margin-top:2px}
  .addform .acts button{flex:1;padding:7px;border-radius:7px;border:1px solid var(--line);cursor:pointer;font-weight:600;font-size:12px}
  .addform .acts .ok{background:var(--accent2);border-color:var(--accent2);color:#fff}
  .addform .acts .cancel{background:transparent;color:var(--muted)}

  /* ---- sidebar ---- */
  #pool{width:340px;flex-shrink:0;border-left:1px solid var(--line);background:var(--panel);
    display:flex;flex-direction:column;min-height:0}
  #pool.drag-over{background:#1b2230}
  .poolhead{padding:12px 14px;border-bottom:1px solid var(--line)}
  .poolhead .row{display:flex;align-items:center;gap:8px;margin-bottom:9px}
  .poolhead h2{font-size:13px;margin:0;text-transform:uppercase;letter-spacing:.6px;color:var(--muted)}
  .count-pill{background:var(--panel2);border:1px solid var(--line);border-radius:20px;padding:2px 9px;font-size:12px}
  #search{width:100%;background:var(--bg);border:1px solid var(--line);border-radius:9px;padding:8px 10px}
  #search:focus{outline:none;border-color:var(--accent)}
  .filters{display:flex;gap:7px;margin-top:9px}
  .filters select{flex:1;background:var(--bg);border:1px solid var(--line);border-radius:9px;padding:7px 8px;font-size:12px}
  #poollist{overflow:auto;padding:10px;display:flex;flex-direction:column;gap:7px;flex:1}
  #poollist-empty{color:var(--muted2);text-align:center;padding:30px 10px;font-size:12px}
  .legend{display:flex;flex-wrap:wrap;gap:6px 12px;padding:10px 14px;border-top:1px solid var(--line);font-size:10.5px;color:var(--muted)}
  .legend i{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px;vertical-align:middle}
  .tip{position:fixed;z-index:50;pointer-events:none;background:#000;border:1px solid var(--line);
    border-radius:8px;padding:8px 10px;font-size:11.5px;max-width:280px;color:var(--ink);
    box-shadow:0 8px 24px rgba(0,0,0,.5);display:none;white-space:pre-wrap}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:#2a2f3a;border-radius:8px}
  .tabs{display:flex;gap:4px;background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:3px}
  .tabs button{background:transparent;border:none;color:var(--muted);padding:6px 14px;border-radius:7px;
    cursor:pointer;font-weight:600;font-size:13px}
  .tabs button.active{background:var(--accent2);color:#fff}
  .tabs button:not(.active):hover{color:var(--ink)}
  /* AI modal */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;z-index:100}
  .overlay.open{display:flex}
  .modal{background:var(--panel);border:1px solid var(--line);border-radius:16px;width:560px;max-width:94vw;
    max-height:90vh;overflow:auto;box-shadow:0 24px 70px rgba(0,0,0,.6)}
  .modal h3{margin:0;font-size:16px;display:flex;align-items:center;gap:8px}
  .modal .mhead{display:flex;align-items:center;padding:16px 18px;border-bottom:1px solid var(--line)}
  .modal .mhead .x{margin-left:auto;background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer}
  .modal .mbody{padding:16px 18px;display:flex;flex-direction:column;gap:12px}
  .modal label{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:4px;display:block}
  .modal input,.modal select,.modal textarea{width:100%;background:var(--bg);border:1px solid var(--line);
    border-radius:9px;padding:9px 11px;color:var(--ink);font:inherit}
  .modal input:focus,.modal textarea:focus,.modal select:focus{outline:none;border-color:var(--accent)}
  .modal textarea{resize:vertical;min-height:72px}
  .ai-row{display:flex;gap:10px}
  .ai-row>div{flex:1;min-width:0}
  .chips{display:flex;flex-wrap:wrap;gap:6px}
  .chips button{background:var(--panel2);border:1px solid var(--line);color:var(--muted);border-radius:20px;
    padding:5px 10px;font-size:11.5px;cursor:pointer}
  .chips button:hover{border-color:var(--accent);color:var(--ink)}
  .ai-actions{display:flex;gap:9px;align-items:center}
  .ai-actions .grow{flex:1}
  .ai-status{font-size:12.5px;color:var(--muted);min-height:18px;white-space:pre-wrap}
  .ai-status.err{color:var(--bad)}
  .ai-status.ok{color:var(--good)}
  .ai-note{font-size:10.5px;color:var(--muted2);line-height:1.4}
  .key-row{display:flex;gap:8px}
  .key-row input{flex:1}
  .spin{display:inline-block;width:13px;height:13px;border:2px solid var(--line);border-top-color:var(--accent);
    border-radius:50%;animation:sp .7s linear infinite;vertical-align:-2px;margin-right:5px}
  @keyframes sp{to{transform:rotate(360deg)}}
  /* ---------- mobile / responsive ---------- */
  @media (max-width:860px){
    body{height:auto;min-height:100vh;overflow:auto}
    header{padding:10px 12px;gap:9px}
    header h1{font-size:15px}
    header h1 .sub{display:none}
    .tabs{order:-1}
    .stat{padding:0 8px;border-left:none}
    .stat b{font-size:14px}
    .btn{padding:8px 11px}
    main{flex-direction:column;min-height:0}
    #board{flex:none;padding:12px;grid-template-columns:1fr;gap:12px;overflow:visible}
    #pool{width:auto;flex:none;border-left:none;border-top:2px solid var(--line);min-height:50vh}
    #poollist{max-height:none}
    .modal{width:96vw !important;max-width:96vw}
    .ai-row{flex-wrap:wrap}
    .legend{position:sticky;bottom:0;background:var(--panel)}
  }
  @media (pointer:coarse){
    .person .del{opacity:1}          /* show delete without hover on touch */
    .seatctl button,.tdel{width:30px;height:30px}  /* bigger tap targets */
  }
  /* tap-to-move menu */
  #move-tables .btn{font-size:12.5px}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<header>
  <h1 id="title">Beefbar Dinner<span class="sub" id="subtitle">Seating Planner</span></h1>
  <div class="tabs">
    <button data-ev="dinner" class="active">Dinner</button>
    <button data-ev="summit">Summit</button>
    <button data-ev="p2p">Peer-to-Peer</button>
  </div>
  <div class="stat"><b id="st-seated">0</b><span>Seated</span></div>
  <div class="stat"><b id="st-pool">0</b><span>Unassigned</span></div>
  <div class="stat"><b id="st-tables">0</b><span>Tables used</span></div>
  <div class="stat"><b id="st-checkin">0</b><span>Checked in</span></div>
  <div class="spacer"></div>
  <button class="btn primary" id="btn-ai" title="Make seating changes from a plain-English instruction">✦ AI Assistant</button>
  <button class="btn" id="btn-auto" title="Group guests into tables by role + VIP/relationship score">⚡ Auto-arrange</button>
  <button class="btn" id="btn-add">+ Add table</button>
  <button class="btn" id="btn-export">Export CSV</button>
  <button class="btn ghost" id="btn-reset">Reset</button>
</header>

<main>
  <div id="board"></div>

  <aside id="pool">
    <div class="poolhead">
      <div class="row">
        <h2>Guest Pool</h2>
        <span class="count-pill" id="pool-count">0</span>
        <div class="spacer" style="flex:1"></div>
        <button class="addbtn" id="btn-addperson">+ Add person</button>
      </div>
      <div class="addform" id="addform">
        <div class="two">
          <input id="ap-first" placeholder="First name">
          <input id="ap-last" placeholder="Last name">
        </div>
        <input id="ap-company" placeholder="Company">
        <input id="ap-title" placeholder="Job title">
        <div class="two">
          <select id="ap-cat"></select>
          <input id="ap-vip" placeholder="VIP (e.g. 1)">
        </div>
        <div class="acts">
          <button class="ok" id="ap-save">Add to pool</button>
          <button class="cancel" id="ap-cancel">Cancel</button>
        </div>
      </div>
      <input id="search" placeholder="Search name, company, title…" autocomplete="off">
      <div class="filters">
        <select id="f-cat"><option value="">All categories</option></select>
        <select id="f-din">
          <option value="">All RSVP</option>
          <option value="Yes">Attending</option>
          <option value="Unsure">Unsure</option>
          <option value="Cocktails">Cocktails</option>
          <option value="No">Not attending</option>
          <option value="No response">No response</option>
        </select>
      </div>
      <div class="search-info" id="search-info"></div>
    </div>
    <div id="poollist"></div>
    <div class="legend" id="legend"></div>
  </aside>
</main>

<div class="overlay" id="ai-overlay">
  <div class="modal">
    <div class="mhead">
      <h3>✦ AI Seating Assistant</h3>
      <button class="x" id="ai-close">×</button>
    </div>
    <div class="mbody">
      <div id="ai-key-wrap">
        <label>Anthropic API key <span style="text-transform:none;color:var(--muted2)">(stored only in this browser)</span></label>
        <div class="key-row">
          <input id="ai-key" type="password" placeholder="sk-ant-…" autocomplete="off">
          <button class="btn" id="ai-key-save">Save</button>
        </div>
        <div class="ai-note" id="ai-key-note"></div>
      </div>
      <div class="ai-row">
        <div>
          <label>Model</label>
          <select id="ai-model">
            <option value="claude-opus-4-8">Claude Opus 4.8 (smartest)</option>
            <option value="claude-sonnet-4-6">Claude Sonnet 4.6 (faster/cheaper)</option>
            <option value="claude-haiku-4-5">Claude Haiku 4.5 (cheapest)</option>
          </select>
        </div>
      </div>
      <div>
        <label>Instruction</label>
        <textarea id="ai-prompt" placeholder="e.g. Move all the HR people to one table, or balance VIP tier-1 guests evenly across the tables, or seat Marco Argenti with the founders."></textarea>
      </div>
      <div class="chips" id="ai-chips"></div>
      <div class="ai-actions">
        <button class="btn primary" id="ai-run">Apply changes</button>
        <button class="btn" id="ai-undo" disabled>Undo last AI change</button>
        <span class="grow"></span>
      </div>
      <div class="ai-status" id="ai-status"></div>
      <div class="ai-note" id="ai-foot-note">The current seating &amp; full guest list for this event are sent to Anthropic to compute the changes.</div>
    </div>
  </div>
</div>

<div class="overlay" id="move-overlay">
  <div class="modal" style="width:420px">
    <div class="mhead"><h3 id="move-title">Move guest</h3><button class="x" id="move-close">×</button></div>
    <div class="mbody">
      <button class="btn" id="move-edit" style="width:100%">✎ Edit info</button>
      <label style="margin-top:4px">Move to</label>
      <div id="move-tables" style="display:flex;flex-wrap:wrap;gap:7px;max-height:50vh;overflow:auto"></div>
    </div>
  </div>
</div>

<div class="overlay" id="edit-overlay">
  <div class="modal" style="width:480px">
    <div class="mhead"><h3>✎ Edit guest</h3><button class="x" id="edit-close">×</button></div>
    <div class="mbody">
      <div class="ai-row">
        <div><label>First name</label><input id="e-first"></div>
        <div><label>Last name</label><input id="e-last"></div>
      </div>
      <div><label>Company</label><input id="e-company"></div>
      <div><label>Title / role</label><input id="e-title"></div>
      <div class="ai-row">
        <div><label>Category</label><select id="e-cat"></select></div>
        <div><label>VIP tier</label><input id="e-vip" placeholder="e.g. 1"></div>
      </div>
      <div class="ai-actions">
        <button class="btn primary" id="e-save">Save</button>
        <button class="btn" id="edit-cancel">Cancel</button>
        <span class="grow"></span>
        <button class="btn" id="e-delete" style="border-color:#5a2e2e;color:var(--bad)">Delete guest</button>
      </div>
    </div>
  </div>
</div>

<div class="tip" id="tip"></div>

function vipScore(p){            // tier 1 = most important
  const m=(p.vip||'').match(/[1-4]/); if(!m) return 0;
  return {1:4,2:3,3:2,4:1}[m[0]] || 0;
}
function focusKey(p){            // KF Focused Relationship cluster
  const f=(p.focus||'').trim().toLowerCase();
  if(f.startsWith('a')) return 'A';
  if(f.startsWith('b')) return 'B';
  if(f.startsWith('gavin')) return 'Gavin';
  return '';
}
const ROLE_BUCKET = {
  Technology:'Technology', HR:'HR', CPO:'HR',
  CEO:'Exec', COO:'Exec', CFO:'Exec', President:'Exec',
  Founder:'Founder', Media:'Media',
  Sponsors:'Partners', Facilitator:'Partners', Host:'Partners', Other:'Partners'
};
const ROLE_ORDER = ['Technology','HR','Exec','Founder','Media','Partners'];
function roleBucket(p){ return ROLE_BUCKET[p.category] || 'Partners'; }

// Group everyone into `nTables` tables of `perTable`, clustered by role,
// keeping KF focus-relationships together and seating higher VIP tiers first.
function autoArrange(nTables, perTable){
  const attendees = PEOPLE.filter(p=>(p.dinner||'')!=='No');     // skip explicit "No"
  attendees.sort((a,b)=>{
    const ra=ROLE_ORDER.indexOf(roleBucket(a)), rb=ROLE_ORDER.indexOf(roleBucket(b));
    if(ra!==rb) return ra-rb;
    const fa=focusKey(a), fb=focusKey(b);
    if(fa!==fb) return (fa||'zz').localeCompare(fb||'zz');
    if(vipScore(b)!==vipScore(a)) return vipScore(b)-vipScore(a);
    return (a.company||'').localeCompare(b.company||'');
  });
  state.assign={}; state.tables=[]; state.caps={};
  for(let t=1;t<=nTables;t++){ state.tables.push(t); state.caps[t]=perTable; }
  PEOPLE.forEach(p=>state.assign[p.id]=null);     // everyone starts unassigned
  attendees.forEach((p,i)=>{
    const t = Math.floor(i/perTable)+1;
    state.assign[p.id] = t<=nTables ? t : null;   // overflow stays in pool
  });
  save();
}

  PEOPLE = [...DATA[EVENT].filter(p=>!del.has(p.id)), ...(state.added||[])]
    .map(p=> edits[p.id] ? {...p, ...edits[p.id]} : p);
}

}

  document.getElementById('e-delete').onclick=()=>{ const id=editingId; closeEdit(); if(id!=null) deletePerson(id); };
})();

// Peer-to-peer: small tables of peers — same function, matched by company tier.
// VIP tier is used as the company-stature proxy (tier 1 = biggest / most senior),
// so "big CIOs sit with big CIOs", down the line.
const P2P_BUCKET = {
  CEO:'Chief Executives', President:'Chief Executives', COO:'Chief Executives',
  CFO:'Finance Chiefs',
  Technology:'Technology (CIO/CTO)',
  HR:'People Chiefs (CHRO/CPO)', CPO:'People Chiefs (CHRO/CPO)',
  Founder:'Founders & CEOs', Media:'Media', Sponsors:'Partners',
  Facilitator:'Partners', Host:'Partners', Other:'Partners'
};
const P2P_ORDER = ['Chief Executives','Finance Chiefs','Technology (CIO/CTO)',
  'People Chiefs (CHRO/CPO)','Founders & CEOs','Media','Partners'];
function p2pBucket(p){ return P2P_BUCKET[p.category] || 'Partners'; }

function autoArrangeP2P(perTable){
  const attendees = PEOPLE.filter(p=>(p.dinner||'')!=='No');
  attendees.sort((a,b)=>{
    const ra=P2P_ORDER.indexOf(p2pBucket(a)), rb=P2P_ORDER.indexOf(p2pBucket(b));
    if(ra!==rb) return ra-rb;                          // peers of the same function together
    if(vipScore(b)!==vipScore(a)) return vipScore(b)-vipScore(a); // big companies (tier 1) first
    return (a.company||'').localeCompare(b.company||'');
  });
  const nTables = Math.max(1, Math.ceil(attendees.length/perTable));
  state.assign={}; state.tables=[]; state.caps={};
  for(let t=1;t<=nTables;t++){ state.tables.push(t); state.caps[t]=perTable; }
  PEOPLE.forEach(p=>state.assign[p.id]=null);
  attendees.forEach((p,i)=>{ state.assign[p.id]=Math.floor(i/perTable)+1; });
  save();
}

// ---------- per-event state init ----------
function initState(){
  PEOPLE = DATA[EVENT];
  const ev = EVENTS[EVENT];
  state = load();
  if(!state){
    state = {assign:{}, caps:{}, tables:[], filters:{q:'',cat:'',din:''}, added:[], deleted:[], edits:{}, checkin:{}, nextId:10000};
    if(EVENT==='summit'){
      autoArrange(ev.defTables, ev.defCap);       // auto-group summit on first load
    } else if(EVENT==='p2p'){
      autoArrangeP2P(ev.defCap);                  // peer tables of 4 on first load
    } else {
      state.assign = Object.fromEntries(PEOPLE.map(p=>[p.id, p.table]));
      const used=new Set(Object.values(state.assign).filter(v=>v!=null));
      state.tables=[...used].sort((a,b)=>a-b);
      if(!state.tables.length) state.tables=Array.from({length:ev.defTables},(_,i)=>i+1);
      state.tables.forEach(t=>{ if(state.caps[t]==null) state.caps[t]=(occupants(t).length>5?6:5); });
    }
    save();
  }
  if(!state.filters) state.filters={q:'',cat:'',din:''};
  if(!state.added) state.added=[];
  if(!state.deleted) state.deleted=[];
  if(!state.edits) state.edits={};
  if(!state.checkin) state.checkin={};
  if(state.nextId==null) state.nextId=10000;
  rebuildPeople();
}
initState();

      <span class="badge din-${din}" title="Status: ${esc(dinLabel)}">${esc(shortDin(p.dinner))}</span>
    </div>
    ${p.focus?`<span class="focus">↪ ${esc(p.focus.slice(0,18))}</span>`:''}
    <button class="del" title="Remove guest" draggable="false">×</button>`;
  el.addEventListener('dragstart',e=>{
    e.dataTransfer.setData('text/plain',p.id);
    e.dataTransfer.effectAllowed='move';
    el.classList.add('dragging');
  });
  el.addEventListener('dragend',()=>el.classList.remove('dragging'));
  el.addEventListener('contextmenu',e=>{ e.preventDefault(); openEditPerson(p.id); });
  el.addEventListener('click',e=>{ if(e.target.closest('.del')) return; if(COARSE){ e.preventDefault(); openMoveMenu(p.id); } });
  const del=el.querySelector('.del');

function shortDin(d){
  if(!d) return '?';
  if(d==='Yes') return '✓';
  if(d==='No') return '✗';
  if(d==='No response') return 'NR';
  if(d==='Unsure') return '?';
  if(d==='Cocktails') return '🍸';
  return d;
}

function renderBoard(){
  board.innerHTML='';
  state.tables.forEach(t=>{
    const occ = occupants(t);
    const cap = state.caps[t];
    const slots = Math.max(cap, occ.length);     // never hide a guest
    const node = document.createElement('div');
    node.className='tnode'+(occ.length>cap?' over-cap':'');
    node.dataset.table=t;
    node.innerHTML=`
      <div class="tn-head">
        <span class="num">Table ${t}</span>
        <span class="seatctl">
          <button data-act="dec" title="Remove a chair">−</button>
          <span class="cap">${occ.length}/${cap}</span>
          <button data-act="inc" title="Add a chair">+</button>
        </span>
        <button class="tdel" data-act="del" title="Delete table (guests return to pool)">🗑</button>
      </div>
      <div class="seats"></div>`;
    const seats=node.querySelector('.seats');
    for(let i=0;i<slots;i++){
      if(occ[i]){
        seats.appendChild(personCard(occ[i], true));
      } else {
        const e=document.createElement('div'); e.className='seat-empty'; e.textContent='Empty seat';
        seats.appendChild(e);
      }
    }
    if(filterActive()){
      seats.querySelectorAll('.person').forEach(el=>{
        const m=matchesFilter(byId(+el.dataset.id));
        el.classList.toggle('hit', m); el.classList.toggle('dim', !m);
      });
    }
    // flag guests from the same company seated together
    const cco={};
    occ.forEach(p=>{ const c=(p.company||'').trim().toLowerCase(); if(c) cco[c]=(cco[c]||0)+1; });
    if(Object.values(cco).some(v=>v>1)){
      seats.querySelectorAll('.person').forEach(el=>{
        const p=byId(+el.dataset.id); const c=(p.company||'').trim().toLowerCase();
        if(c&&cco[c]>1) el.classList.add('dupco');
      });
      const cos=[...new Set(occ.map(p=>(p.company||'').trim()).filter(c=>c&&cco[c.toLowerCase()]>1))];
      const w=document.createElement('span'); w.className='tn-warn'; w.textContent='⚠ same company';
      w.title='Same company seated together: '+cos.join(', ');
      node.querySelector('.tn-head').appendChild(w);
    }
    node.querySelector('[data-act="inc"]').onclick=()=>{state.caps[t]=Math.min(12,cap+1);save();renderAll();};
    node.querySelector('[data-act="dec"]').onclick=()=>{state.caps[t]=Math.max(1,cap-1);save();renderAll();};
    node.querySelector('[data-act="del"]').onclick=()=>{
      if(occ.length && !confirm(`Delete Table ${t}? Its ${occ.length} guest${occ.length===1?'':'s'} will go back to the pool.`)) return;
      occ.forEach(p=>state.assign[p.id]=null);
      state.tables=state.tables.filter(x=>x!==t);
      delete state.caps[t];
      save(); renderAll();
    };
    wireDrop(node, t);
    board.appendChild(node);
  });
}

function filterActive(){ const f=state.filters; return !!((f.q&&f.q.trim())||f.cat||f.din); }
function matchesFilter(p){
  if(!p) return false;
  const {q,cat,din}=state.filters; const ql=(q||'').trim().toLowerCase();
  if(cat && p.category!==cat) return false;
  if(din && p.dinner!==din) return false;
  if(ql){
    const hay=(p.first+' '+p.last+' '+p.company+' '+p.title+' '+p.category).toLowerCase();
    if(!hay.includes(ql)) return false;
  }
  return true;
}
function renderPool(){
  const list = PEOPLE.filter(p=>state.assign[p.id]==null && matchesFilter(p))
    .sort((a,b)=> (a.last||'').localeCompare(b.last||''));
  // seated-guest search count
  const info=document.getElementById('search-info');
  if(filterActive()){
    const seated=PEOPLE.filter(p=>state.assign[p.id]!=null && matchesFilter(p)).length;
    info.textContent = seated ? `${seated} seated guest${seated===1?'':'s'} match — highlighted on the chart` : 'No seated guests match this search';
  } else { info.textContent=''; }
  poollist.innerHTML='';
  if(!list.length){
    poollist.innerHTML='<div id="poollist-empty">No matching guests in the pool.</div>';
  } else {
    list.forEach(p=>poollist.appendChild(personCard(p,false)));
  }
  document.getElementById('pool-count').textContent=list.length;
}

function renderStats(){
  const seated = Object.values(state.assign).filter(v=>v!=null).length;
  document.getElementById('st-seated').textContent=seated;
  document.getElementById('st-pool').textContent=PEOPLE.length-seated;

// ---------- drag/drop targets ----------
function wireDrop(el, table){
  el.addEventListener('dragover',e=>{e.preventDefault();e.dataTransfer.dropEffect='move';el.classList.add('drag-over');});
  el.addEventListener('dragleave',e=>{ if(!el.contains(e.relatedTarget)) el.classList.remove('drag-over');});
  el.addEventListener('drop',e=>{
    e.preventDefault(); el.classList.remove('drag-over');
    const id=+e.dataTransfer.getData('text/plain');
    if(!id) return;
    state.assign[id]= table; // table===null means pool
    save(); renderAll();
  });
}

      p.company?'· '+p.company:'',
      `Category: ${p.category}`,
      p.vip?`VIP: ${p.vip}`:'',
      `Status: ${p.dinner||'—'}`,
      p.focus?`Focus: ${p.focus}`:'',

    tip.textContent=lines.join('\n');
    tip.style.display='block';
  });

    if(x+r.width>innerWidth) x=e.clientX-r.width-pad;

    tip.style.left=x+'px'; tip.style.top=y+'px';

  }
};
let aiUndo=null;
const AI_KEY_STORE='anthropic-key', AI_MODEL_STORE='anthropic-model';
function aiEl(id){return document.getElementById(id);}
function aiSetStatus(msg,cls){const s=aiEl('ai-status');s.className='ai-status'+(cls?' '+cls:'');s.innerHTML=msg;}

function buildAIMessages(instruction){
  const tablesInfo=state.tables.map(t=>`Table ${t}: capacity ${state.caps[t]}, ${occupants(t).length} seated`).join('\n');
  const roster=PEOPLE.map(p=>`#${p.id} ${p.first} ${p.last} | ${p.company||'-'} | role:${p.category} | VIP:${p.vip||'-'} | focus:${p.focus||'-'} | table:${state.assign[p.id]??'POOL'}`).join('\n');
  const sys=`You are a seating-chart assistant for the "${EVENTS[EVENT].label}" event. You change the seating by calling the apply_seating_changes tool.

VIP tier 1 is the most important guest; higher numbers are less senior. "focus" marks a relationship cluster (A/B/Gavin) that generally should sit together. Dinner tables hold ~5-6; Summit tables hold ~10.

TABLES:
${tablesInfo}

GUESTS (id | name | company | role | VIP tier | focus | current table):
${roster}

Rules:
- Reference guests only by their numeric id.
- In "assignments", include ONLY guests whose table changes; set table to a number to seat them or null to move them to the pool.
- To ADD a brand-new person who is not in the guest list, use "newGuests" (not "assignments") with their details and the table to seat them at.
- Keep tables within a sensible size unless the user says otherwise; you may adjust capacities or add tables when needed.
- Follow the user's instruction precisely; if ambiguous, choose the most reasonable interpretation.
Always call apply_seating_changes with a concise summary.`;
  return {system:sys, messages:[{role:'user',content:instruction}]};
}

async function runAI(){
  const instruction=aiEl('ai-prompt').value.trim();
  if(!instruction){ aiSetStatus('Type an instruction.','err'); aiEl('ai-prompt').focus(); return; }
  const model=aiEl('ai-model').value;
  localStorage.setItem(AI_MODEL_STORE,model);
  aiEl('ai-run').disabled=true;
  aiSetStatus('<span class="spin"></span>Thinking…');
  const {system,messages}=buildAIMessages(instruction);
  try{
    const res=await fetch(AI_PROXY_URL,{
      method:'POST',
      headers:{'content-type':'application/json','apikey':CLOUD_KEY,'authorization':'Bearer '+CLOUD_KEY},
      body:JSON.stringify({model,max_tokens:8192,system,tools:[AI_TOOL],
        tool_choice:{type:'tool',name:'apply_seating_changes'},messages})
    });
    const data=await res.json();
    if(!res.ok){ aiSetStatus('AI error: '+esc((data.error&&data.error.message)||res.status),'err'); return; }
    const tu=(data.content||[]).find(b=>b.type==='tool_use');
    if(!tu){ aiSetStatus('No changes were returned.','err'); return; }
    const r=applyAIChanges(tu.input);
    const parts=[]; if(r.moved) parts.push(`${r.moved} moved`); if(r.added) parts.push(`${r.added} added`);
    aiSetStatus('✓ '+esc(tu.input.summary||'Done')+(parts.length?`  ( ${parts.join(', ')} )`:''),'ok');
    aiEl('ai-undo').disabled=false;
  }catch(e){
    aiSetStatus('Request failed: '+esc(e.message)+'\n(If this is a network/CORS error, check the key and your connection.)','err');
  }finally{
    aiEl('ai-run').disabled=false;
  }
}

function applyAIChanges(input){
  aiUndo=JSON.parse(JSON.stringify(state));
  const ensureTable=t=>{ if(t!=null && !state.tables.includes(t)){ state.tables.push(t); if(state.caps[t]==null) state.caps[t]=EVENTS[EVENT].defCap; } };
  (input.capacities||[]).forEach(c=>{ ensureTable(c.table); state.caps[c.table]=Math.max(1,c.seats); });
  for(let i=0;i<(input.addTables||0);i++){ const nt=Math.max(0,...state.tables)+1; state.tables.push(nt); state.caps[nt]=EVENTS[EVENT].defCap; }
  let moved=0, added=0;
  (input.newGuests||[]).forEach(g=>{
    const p={id:state.nextId++, first:g.first||'', last:g.last||'', company:g.company||'', title:g.title||'',
      category:g.category||'Other', dinner:'', vip:g.vip||'', focus:'', notes:'', table:null, rawTable:''};
    state.added=[...(state.added||[]), p];
    const t=(g.table===undefined?null:g.table); ensureTable(t); state.assign[p.id]=t; added++;
  });
  (input.assignments||[]).forEach(a=>{ if(byId(a.id)){ ensureTable(a.table); state.assign[a.id]=a.table; moved++; } });
  rebuildPeople();
  state.tables.sort((a,b)=>a-b);
  save(); renderAll();
  return {moved, added};
}

  aiEl('ai-run').onclick=runAI;
  aiEl('ai-undo').onclick=()=>{ if(aiUndo){ state=aiUndo; aiUndo=null; rebuildPeople(); save(); renderAll(); applyEventChrome(); aiSetStatus('Reverted the last AI change.',''); aiEl('ai-undo').disabled=true; } };
  const examples=['Balance VIP tier-1 guests evenly across all tables',
    'Put all HR / Chief People Officers together',
    'Spread the hosts and facilitators one per table',
    'Move everyone from the pool onto the emptiest tables'];
  const chips=aiEl('ai-chips');
  examples.forEach(x=>{ const b=document.createElement('button'); b.textContent=x; b.onclick=()=>{aiEl('ai-prompt').value=x;aiEl('ai-prompt').focus();}; chips.appendChild(b); });
})();

// legend (static — covers every category color)
const legend=document.getElementById('legend');
CAT_COLORS.forEach(c=>{
  const s=document.createElement('span');
  s.innerHTML=`<i style="background:var(--c-${c})"></i>${c}`;
  legend.appendChild(s);
});

function esc(s){return String(s??'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}

applyEventChrome();
renderAll();
cloudSubscribe();
cloudPull();
</script>
</body>
</html>
